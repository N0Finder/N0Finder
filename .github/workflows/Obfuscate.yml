name: Build Obfuscate BPB Panel

on:
  push:
    branches:
      - main
  schedule:
        # Runs everyday at 1:00 AM
        - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: Install dependencies
        run: |
          npm install -g javascript-obfuscator

      - name: Clone BPB workjs
        run: |
          wget -O origin.js https://raw.githubusercontent.com/bia-pain-bache/BPB-Worker-Panel/refs/heads/main/build/unobfuscated-worker.js

      - name: Obfuscate BPB worker js
        run: |
          javascript-obfuscator origin.js --output _worker.js \
          --compact true \
          --control-flow-flattening true \
          --control-flow-flattening-threshold 0.8 \  # 比原1.0更平衡性能[1,7](@ref)
          --dead-code-injection true \
          --dead-code-injection-threshold 0.4 \     # 避免过度增加代码体积[3](@ref)
          --identifier-names-generator hexadecimal \
          --rename-globals true \
          --string-array true \
          --string-array-encoding 'rc4' \           # 比base64更安全的加密方式[4](@ref)
          --string-array-threshold 0.75 \           # 提升字符串保护覆盖率[1](@ref)
          --transform-object-keys true \            # 新增对象键混淆[4](@ref)
          --unicode-escape-sequence true \
          --self-defending true \                   # 新增防格式化保护[7](@ref)
          --debug-protection true \                 # 新增调试保护[4](@ref)
          --disable-console-output true             # 禁用控制台输出[7](@ref)

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: ':arrow_up: update latest bpb panel'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          push_options: '--set-upstream'
